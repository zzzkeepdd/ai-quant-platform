name: Build Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test backend
        working-directory: backend
        run: |
          $env:PYTHONPATH = (Get-Location).Path
          pytest

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Windows executable
        run: pyinstaller packaging/windows_launcher.spec --clean --noconfirm

      - name: Remove runtime state
        shell: pwsh
        run: |
          Remove-Item -LiteralPath "dist/AIQuantPlatform/_internal/backend/data_cache/quant_platform.sqlite3" -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath "dist/AIQuantPlatform/_internal/backend/data_cache/quant_platform.sqlite3-shm" -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath "dist/AIQuantPlatform/_internal/backend/data_cache/quant_platform.sqlite3-wal" -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath "dist/AIQuantPlatform/_internal/backend/data_cache/.secret.key" -Force -ErrorAction SilentlyContinue

      - name: Package release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist/AIQuantPlatform" -DestinationPath "release/AIQuantPlatform-${{ github.ref_name }}-windows.zip" -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/AIQuantPlatform-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
